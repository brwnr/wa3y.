<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Panel — WA3Y</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1db954;
  --dark-green: #0d8c3e;
  --bg: #0a0f0d;
  --surface: #111a15;
  --surface2: #162019;
  --border: #1f3028;
  --text: #e8f5ee;
  --muted: #6b8f78;
  --accent: #39ff8e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -200px; left: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(29,185,84,0.08), transparent 70%);
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  bottom: -200px; right: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(57,255,142,0.05), transparent 70%);
  pointer-events: none;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 40px;
  background: rgba(10,15,13,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}

.nav-brand {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.nav-brand span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 10px; }

.doctor-info { text-align: right; }
.doctor-info strong { display: block; font-size: 14px; color: var(--text); }
.doctor-info small { color: var(--muted); font-size: 12px; }

.logout-btn {
  padding: 9px 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  transition: 0.2s;
}
.logout-btn:hover { border-color: var(--green); color: var(--green); }

.right-nav { display: flex; align-items: center; gap: 20px; }

/* MAIN */
.container { padding: 50px 40px; max-width: 1200px; margin: 0 auto; }

.section-header { margin-bottom: 30px; }
.section-header h2 {
  font-family: 'Syne', sans-serif;
  font-size: 28px; font-weight: 700;
  color: var(--text);
}
.section-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

/* MODULE SECTION */
.module-section { margin-bottom: 60px; }

.scroll-wrapper { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; }
.scroll-wrapper::-webkit-scrollbar { height: 4px; }
.scroll-wrapper::-webkit-scrollbar-track { background: var(--surface); border-radius: 4px; }
.scroll-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* CARD */
.card {
  min-width: 220px; width: 220px; height: 260px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 20px;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: 0.3s ease;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  overflow: hidden;
}

.card::after {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--green), var(--accent));
  transform: scaleX(0); transform-origin: left;
  transition: 0.3s;
}

.card:hover { transform: translateY(-6px); border-color: var(--dark-green); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(29,185,84,0.1); }
.card:hover::after { transform: scaleX(1); }

.card img {
  width: 80px; height: 80px; object-fit: cover;
  border-radius: 14px; background: var(--surface2);
  margin-bottom: 14px; padding: 12px;
  transition: 0.3s;
}
.card:hover img { transform: scale(1.08); }

.card h3 { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--text); margin-bottom: 6px; }
.card p { font-size: 12px; color: var(--muted); line-height: 1.5; }

.open-label {
  margin-top: auto;
  font-size: 12px; font-weight: 600;
  color: var(--green); opacity: 0;
  transition: 0.2s;
}
.card:hover .open-label { opacity: 1; }

.delete-btn {
  position: absolute; top: 10px; right: 10px;
  width: 26px; height: 26px;
  background: rgba(255,77,77,0.15); border: 1px solid rgba(255,77,77,0.3);
  border-radius: 50%; color: #ff6b6b; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: 0.2s; opacity: 0;
}
.card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { background: rgba(255,77,77,0.3); }

/* ADD CARD */
.add-card {
  min-width: 220px; width: 220px; height: 260px;
  border: 2px dashed var(--border); border-radius: 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; cursor: pointer; color: var(--muted); flex-shrink: 0;
  transition: 0.3s;
}
.add-card .plus { font-size: 36px; color: var(--green); }
.add-card span { font-size: 13px; }
.add-card:hover { border-color: var(--green); color: var(--green); background: rgba(29,185,84,0.03); }

/* MODAL */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  display: none; align-items: center; justify-content: center;
  z-index: 999;
}
.modal.show { display: flex; animation: fadeIn 0.2s; }

.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 36px;
  width: 420px; max-width: 90%;
  animation: popUp 0.25s ease;
}

.modal-content h2 {
  font-family: 'Syne', sans-serif; font-size: 22px;
  margin-bottom: 24px; color: var(--text);
}

.modal-content input,
.modal-content textarea {
  width: 100%; padding: 12px 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  margin-bottom: 14px; outline: none; transition: 0.2s;
}
.modal-content input:focus, .modal-content textarea:focus { border-color: var(--green); }
.modal-content textarea { resize: vertical; min-height: 80px; }

.modal-btns { display: flex; gap: 10px; margin-top: 8px; }

.btn-save {
  flex: 1; padding: 12px;
  background: var(--green); color: #000;
  border: none; border-radius: 10px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; transition: 0.2s;
}
.btn-save:hover { background: var(--accent); }

.btn-cancel {
  flex: 1; padding: 12px;
  background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border); border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  cursor: pointer; transition: 0.2s;
}
.btn-cancel:hover { border-color: var(--muted); color: var(--text); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popUp { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<header class="navbar">
  <div class="nav-brand">WA3Y <span>/ Doctor Panel</span></div>
  <div class="right-nav">
    <div class="doctor-info">
      <strong>Dr. Ahmed</strong>
      <small>doctor@example.com</small>
    </div>
    <button class="logout-btn">Logout</button>
  </div>
</header>

<main class="container">

  <section class="module-section">
    <div class="section-header">
      <h2>Analysis Modules</h2>
      <p>Select a module to manage its questions</p>
    </div>
    <div class="scroll-wrapper">
      <div id="analysisModules" style="display:flex;gap:20px;"></div>
      <div class="add-card" onclick="openAddModal('analysisModules')">
        <span class="plus">+</span>
        <span>Add Module</span>
      </div>
    </div>
  </section>

  <section class="module-section">
    <div class="section-header">
      <h2>More Modules</h2>
      <p>Additional tools and features</p>
    </div>
    <div class="scroll-wrapper">
      <div id="moreModules" style="display:flex;gap:20px;"></div>
      <div class="add-card" onclick="openAddModal('moreModules')">
        <span class="plus">+</span>
        <span>Add Module</span>
      </div>
    </div>
  </section>

</main>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>New Module</h2>
    <input id="moduleName" placeholder="Module name">
    <textarea id="moduleDesc" placeholder="Short description"></textarea>
    <input id="moduleIcon" placeholder="Image URL (icon)">
    <div class="modal-btns">
      <button class="btn-save" onclick="saveModule()">Save</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
let currentContainer = "";

const defaultModules = [
  { name: "Anxiety Test", desc: "Detect anxiety patterns from user responses", icon: "https://cdn-icons-png.flaticon.com/512/2785/2785482.png" },
  { name: "Depression Screening", desc: "Evaluate depressive symptoms", icon: "https://cdn-icons-png.flaticon.com/512/2921/2921222.png" }
];

function loadModules() {
  const saved = JSON.parse(localStorage.getItem("modules")) || defaultModules;
  document.getElementById("analysisModules").innerHTML = "";
  saved.forEach(m => createCard(m, "analysisModules"));
}

function createCard(module, containerId) {
  const container = document.getElementById(containerId);
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <button class="delete-btn" title="Delete">✕</button>
    <img src="${module.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2785/2785482.png'">
    <h3>${module.name}</h3>
    <p>${module.desc}</p>
    <span class="open-label">Open →</span>
  `;

  card.addEventListener("click", function(e) {
    // Don't navigate if the delete button was clicked
    if (e.target.classList.contains("delete-btn")) return;
    localStorage.setItem("currentModule", module.name);
    window.location.href = "admin part2.html";
  });

  card.querySelector(".delete-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    e.preventDefault();
    if (!confirm(`Delete "${module.name}"?`)) return;
    let modules = JSON.parse(localStorage.getItem("modules")) || [];
    modules = modules.filter(m => m.name !== module.name);
    localStorage.setItem("modules", JSON.stringify(modules));
    card.remove();
  });

  container.appendChild(card);
}

function openAddModal(id) {
  currentContainer = id;
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

function saveModule() {
  const name = document.getElementById("moduleName").value.trim();
  const desc = document.getElementById("moduleDesc").value.trim();
  const icon = document.getElementById("moduleIcon").value.trim();
  if (!name || !desc) { alert("Name and description required"); return; }

  const newModule = { name, desc, icon: icon || "https://cdn-icons-png.flaticon.com/512/2785/2785482.png" };
  let modules = JSON.parse(localStorage.getItem("modules")) || defaultModules;
  modules.push(newModule);
  localStorage.setItem("modules", JSON.stringify(modules));
  createCard(newModule, currentContainer);
  closeModal();
  document.getElementById("moduleName").value = "";
  document.getElementById("moduleDesc").value = "";
  document.getElementById("moduleIcon").value = "";
}

document.querySelector(".logout-btn").onclick = () => { localStorage.clear(); alert("Logged out"); };

loadModules();
</script>
</body>
</html>
