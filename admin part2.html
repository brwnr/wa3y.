<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Builder — WA3Y</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1db954;
  --dark-green: #0d8c3e;
  --bg: #0a0f0d;
  --surface: #111a15;
  --surface2: #162019;
  --border: #1f3028;
  --text: #e8f5ee;
  --muted: #6b8f78;
  --accent: #39ff8e;
  --red: #ff4d4d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; top: -200px; left: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(29,185,84,0.07), transparent 70%);
  pointer-events: none;
}

/* NAVBAR */
.navbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 40px;
  background: rgba(10,15,13,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.nav-brand { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); }
.nav-brand span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
.right-nav { display: flex; align-items: center; gap: 16px; }
.doctor-info strong { display: block; font-size: 13px; }
.doctor-info small { color: var(--muted); font-size: 11px; }
.logout-btn {
  padding: 8px 18px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); border-radius: 8px;
  cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: 0.2s;
}
.logout-btn:hover { border-color: var(--green); color: var(--green); }

/* BACK */
.back-btn {
  position: fixed; top: 90px; left: 24px;
  width: 38px; height: 38px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 50%; color: var(--muted); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: 0.2s; z-index: 50;
}
.back-btn:hover { border-color: var(--green); color: var(--green); }

/* MAIN */
.main { max-width: 680px; margin: 0 auto; padding: 50px 20px 80px; }

.page-title {
  font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700;
  margin-bottom: 6px;
}
.module-badge {
  display: inline-block; padding: 4px 12px;
  background: rgba(29,185,84,0.12); border: 1px solid rgba(29,185,84,0.25);
  border-radius: 20px; color: var(--green); font-size: 12px; margin-bottom: 36px;
}

/* QUESTION LIST */
.questions-list { margin-bottom: 40px; }
.q-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 22px; margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 16px; position: relative;
  transition: 0.2s;
}
.q-card:hover { border-color: var(--dark-green); }
.q-num {
  min-width: 32px; height: 32px;
  background: rgba(29,185,84,0.12); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--green);
}
.q-body { flex: 1; }
.q-text { font-size: 15px; margin-bottom: 10px; }
.q-options { display: flex; flex-wrap: wrap; gap: 8px; }
.q-option {
  padding: 4px 12px; border-radius: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}
.q-goal {
  font-size: 11px; color: var(--green); margin-top: 8px;
  opacity: 0.8;
}
.q-delete {
  width: 28px; height: 28px; background: transparent;
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.q-delete:hover { background: rgba(255,77,77,0.1); border-color: var(--red); color: var(--red); }

.empty-state {
  text-align: center; padding: 40px; color: var(--muted); font-size: 14px;
}
.empty-state .icon { font-size: 36px; margin-bottom: 10px; }

/* FORM BOX */
.form-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
  padding: 30px; position: relative; overflow: hidden;
}
.form-box::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--green), var(--accent));
}

.form-box h3 {
  font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 24px;
  color: var(--text);
}

/* TYPE SELECTOR */
.type-selector { display: flex; gap: 10px; margin-bottom: 24px; }
.type-btn {
  flex: 1; padding: 10px; border: 1px solid var(--border);
  background: transparent; border-radius: 10px; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: 0.2s;
}
.type-btn.active { border-color: var(--green); color: var(--green); background: rgba(29,185,84,0.07); }

/* INPUTS */
label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

input[type="text"], textarea, select {
  width: 100%; padding: 12px 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; transition: 0.2s; margin-bottom: 18px;
}
input[type="text"]:focus, textarea:focus, select:focus {
  border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,185,84,0.08);
}
textarea { resize: vertical; min-height: 90px; }
select option { background: var(--bg); }

/* OPTIONS */
.options-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.option-item {
  display: flex; gap: 10px; margin-bottom: 10px; align-items: center;
}
.option-item input { margin-bottom: 0; }
.del-opt {
  width: 34px; height: 34px; min-width: 34px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.del-opt:hover { border-color: var(--red); color: var(--red); }

.btn-add-opt {
  width: 100%; padding: 11px; margin-bottom: 20px;
  background: transparent; border: 1px dashed var(--border);
  border-radius: 10px; color: var(--muted); cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13px; transition: 0.2s;
}
.btn-add-opt:hover { border-color: var(--green); color: var(--green); }

.btn-save {
  width: 100%; padding: 14px;
  background: var(--green); color: #000;
  border: none; border-radius: 12px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
  cursor: pointer; transition: 0.2s;
}
.btn-save:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(29,185,84,0.25); }

/* MEDIA PREVIEW */
.media-preview { width: 100%; border-radius: 10px; margin-bottom: 18px; max-height: 200px; object-fit: cover; display: none; }

/* TOAST */
.toast {
  position: fixed; bottom: 30px; right: 30px;
  background: var(--green); color: #000;
  padding: 14px 24px; border-radius: 12px;
  font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px;
  transform: translateY(80px); opacity: 0; transition: 0.3s;
  z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<header class="navbar">
  <div class="nav-brand">WA3Y <span>/ Question Builder</span></div>
  <div class="right-nav">
    <div class="doctor-info">
      <strong>Dr. Ahmed</strong>
      <small>doctor@example.com</small>
    </div>
    <button class="logout-btn">Logout</button>
  </div>
</header>

<button class="back-btn" onclick="window.location.href='admin part.html'">←</button>

<main class="main">
  <div class="page-title">Question Builder</div>
  <div class="module-badge" id="moduleBadge">Loading module...</div>

  <!-- SAVED QUESTIONS -->
  <div class="questions-list" id="questionsList"></div>

  <!-- FORM -->
  <div class="form-box">
    <h3>Add New Question</h3>

    <div class="type-selector">
      <button class="type-btn active" onclick="setType('text', this)">📝 Text</button>
      <button class="type-btn" onclick="setType('image', this)">🖼 Image</button>
      <button class="type-btn" onclick="setType('video', this)">🎥 Video</button>
    </div>

    <label>Question</label>
    <textarea id="questionText" placeholder="Write your question here..."></textarea>

    <div id="mediaInput"></div>
    <img id="mediaPreview" class="media-preview">

    <label>Goal / Analysis Type</label>
    <select id="goalSelect">
      <option value="general">General</option>
      <option value="detect_anxiety">Detect Anxiety</option>
      <option value="detect_depression">Detect Depression</option>
      <option value="detect_lying">Detect Deception</option>
      <option value="detect_stress">Detect Stress</option>
    </select>

    <div class="options-label">Answer Options (MCQ)</div>
    <div id="optionsContainer"></div>
    <button class="btn-add-opt" onclick="addOption()">+ Add Option</button>

    <button class="btn-save" onclick="saveQuestion()">Save Question</button>
  </div>
</main>

<div class="toast" id="toast">✓ Question saved!</div>

<script>
let selectedType = 'text';
let currentModule = localStorage.getItem("currentModule") || "General Module";

document.getElementById("moduleBadge").textContent = currentModule;

// ---- TYPE ----
function setType(type, btn) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const mi = document.getElementById("mediaInput");
  const preview = document.getElementById("mediaPreview");
  mi.innerHTML = '';
  preview.style.display = 'none';

  if (type === 'image') {
    mi.innerHTML = `<label>Image</label><input type="file" accept="image/*" onchange="previewMedia(this,'image')">`;
  } else if (type === 'video') {
    mi.innerHTML = `<label>Video</label><input type="file" accept="video/*">`;
  }
}

function previewMedia(input, type) {
  const preview = document.getElementById("mediaPreview");
  if (type === 'image' && input.files[0]) {
    preview.src = URL.createObjectURL(input.files[0]);
    preview.style.display = 'block';
  }
}

// ---- OPTIONS ----
function addOption() {
  const container = document.getElementById("optionsContainer");
  const div = document.createElement("div");
  div.className = "option-item";
  div.innerHTML = `
    <input type="text" placeholder="Option text">
    <button class="del-opt" onclick="this.parentElement.remove()">✕</button>
  `;
  container.appendChild(div);
}

// Add 4 default options on load
window.addEventListener('DOMContentLoaded', () => {
  for (let i = 0; i < 4; i++) addOption();
  renderQuestions();
});

// ---- SAVE ----
function saveQuestion() {
  const text = document.getElementById("questionText").value.trim();
  const goal = document.getElementById("goalSelect").value;
  const opts = Array.from(document.querySelectorAll("#optionsContainer input"))
    .map(i => i.value.trim()).filter(v => v);

  if (!text) { alert("Please write a question"); return; }
  if (opts.length < 2) { alert("Add at least 2 options"); return; }

  const questions = getQuestions();
  questions.push({ id: Date.now(), module: currentModule, type: selectedType, text, goal, options: opts });
  saveQuestions(questions);
  renderQuestions();
  showToast();

  // Reset form
  document.getElementById("questionText").value = "";
  document.getElementById("optionsContainer").innerHTML = "";
  for (let i = 0; i < 4; i++) addOption();
  document.getElementById("mediaInput").innerHTML = "";
  document.getElementById("mediaPreview").style.display = 'none';
}

// ---- STORAGE ----
function getQuestions() {
  return JSON.parse(localStorage.getItem("wa3y_questions") || "[]");
}
function saveQuestions(q) {
  localStorage.setItem("wa3y_questions", JSON.stringify(q));
}

// ---- RENDER LIST ----
function renderQuestions() {
  const list = document.getElementById("questionsList");
  const questions = getQuestions().filter(q => q.module === currentModule);

  if (!questions.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>No questions yet. Add your first question below.</div>`;
    return;
  }

  list.innerHTML = questions.map((q, i) => `
    <div class="q-card">
      <div class="q-num">Q${i+1}</div>
      <div class="q-body">
        <div class="q-text">${q.text}</div>
        <div class="q-options">
          ${q.options.map(o => `<span class="q-option">${o}</span>`).join('')}
        </div>
        <div class="q-goal">Goal: ${q.goal}</div>
      </div>
      <button class="q-delete" onclick="deleteQuestion(${q.id})">✕</button>
    </div>
  `).join('');
}

function deleteQuestion(id) {
  let questions = getQuestions().filter(q => q.id !== id);
  saveQuestions(questions);
  renderQuestions();
}

// ---- TOAST ----
function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
